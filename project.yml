name: Medity

options:
  bundleIdPrefix: com.aituglo
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: en
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

configs:
  Debug: debug
  Release: release

schemes:
  Medity:
    build:
      targets:
        Medity: all
        MedityWidgets: all
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - MedityTests
        - MedityUITests
    profile:
      config: Release
    archive:
      config: Release
    analyze:
      config: Debug

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CLANG_ENABLE_OBJC_ARC: YES
    GCC_NO_COMMON_BLOCKS: YES
    ALWAYS_SEARCH_USER_PATHS: NO
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "85Q3MAPQ75"

targets:
  MedityTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MedityTests
    dependencies:
      - target: Medity
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_EMIT_LOC_STRINGS: NO

  MedityUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: MedityUITests
    dependencies:
      - target: Medity
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_EMIT_LOC_STRINGS: NO
        TEST_TARGET_NAME: Medity

  MedityWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: MedityWidgets
      - path: Medity/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aituglo.medity.widgets
        PRODUCT_NAME: MedityWidgets
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        CODE_SIGN_ENTITLEMENTS: MedityWidgets/MedityWidgets.entitlements
        INFOPLIST_FILE: MedityWidgets/Info.plist
        SKIP_INSTALL: YES
        CURRENT_PROJECT_VERSION: "3"
        MARKETING_VERSION: "1.1"

  Medity:
    type: application
    platform: iOS
    sources:
      - path: Medity
    dependencies:
      - target: MedityWidgets
    # xcodegen generates Info.plist explicitly. We were using INFOPLIST_KEY_*
    # build settings, but Xcode 26 silently drops array-typed values
    # (UIBackgroundModes, UIAppFonts) when GENERATE_INFOPLIST_FILE is YES —
    # the auto-Info.plist that lands in the binary doesn't contain them, so
    # iOS refuses background audio and won't load the embedded fonts. An
    # explicit Info.plist file is the only reliable way.
    info:
      path: Medity/Info.plist
      properties:
        CFBundleDisplayName: Medity
        UILaunchScreen:
          UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSupportsIndirectInputEvents: true
        UIStatusBarStyle: UIStatusBarStyleDefault
        NSHealthShareUsageDescription: "Medity reads your heart rate during sessions to give a fuller picture of your practice."
        NSHealthUpdateUsageDescription: "Medity saves your sessions to Apple Health as Mindful Minutes so they count toward your day."
        NSSupportsLiveActivities: true
        UIBackgroundModes:
          - audio
        UIAppFonts:
          - Geist-Thin.otf
          - Geist-ExtraLight.otf
          - Geist-Light.otf
          - Geist-Regular.otf
          - Geist-Medium.otf
          - Geist-SemiBold.otf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aituglo.medity
        PRODUCT_NAME: Medity
        MARKETING_VERSION: "1.1"
        CURRENT_PROJECT_VERSION: "3"
        TARGETED_DEVICE_FAMILY: "1"           # iPhone only
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: Medity/Medity.entitlements
