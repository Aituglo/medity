name: Medity

options:
  bundleIdPrefix: com.aituglo
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: en
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

configs:
  Debug: debug
  Release: release

schemes:
  Medity:
    build:
      targets:
        Medity: all
        MedityWidgets: all
    run:
      config: Debug
      storeKitConfiguration: Medity.storekit
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - MedityTests
    profile:
      config: Release
    archive:
      config: Release
    analyze:
      config: Debug

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CLANG_ENABLE_OBJC_ARC: YES
    GCC_NO_COMMON_BLOCKS: YES
    ALWAYS_SEARCH_USER_PATHS: NO
    CODE_SIGN_STYLE: Automatic

targets:
  MedityTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MedityTests
    dependencies:
      - target: Medity
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_EMIT_LOC_STRINGS: NO

  MedityWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: MedityWidgets
      - path: Medity/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aituglo.medity.widgets
        PRODUCT_NAME: MedityWidgets
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        CODE_SIGN_ENTITLEMENTS: MedityWidgets/MedityWidgets.entitlements
        INFOPLIST_FILE: MedityWidgets/Info.plist
        SKIP_INSTALL: YES
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0"

  Medity:
    type: application
    platform: iOS
    sources:
      - path: Medity
    dependencies:
      - target: MedityWidgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aituglo.medity
        PRODUCT_NAME: Medity
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"           # iPhone only
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: Medity/Medity.entitlements
        # Auto-generated Info.plist (Xcode 14+ build setting flow)
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Medity
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleDefault
        INFOPLIST_KEY_NSHealthShareUsageDescription: "Medity reads your heart rate during sessions to give a fuller picture of your practice."
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "Medity saves your sessions to Apple Health as Mindful Minutes so they count toward your day."
        INFOPLIST_KEY_NSSupportsLiveActivities: YES
